<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/fontawesome.min.css" 
    integrity="sha384-NvKbDTEnL+A8F/AA5Tc5kmMLSJHUO868P+lDtTpJIeQdGYaUIuLr4lVGOEA1OcMy" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous">
  </script>
  
    <title>URT</title>
    <link rel="shortcut icon" type="image/x-icon" href="css_files/img_files/newLogoURT.png">
    <link rel="stylesheet" href="css_files/login.css">

</head>
<body>
    <div class="container">
        <div class="row px-3">
            <div class="col-lg-10 col-xl-9 card flex-row mx auto px-0">
                <div class="img-left d-none d-md-flex"></div>
                <div class="card body">
                    <h4 class="tittle text center mt-4">Login into account</h4>
                    <form action="" class="form-box px-3">
                        <div class="form-input">
                            <span><i class="fa fa-envelope-o"></i></span>
                            <input type="email" name="" placeholder="Email Adress">
                        </div>
                        <div class="form-input">
                            <span><i class="fa fa-envelope-o"></i></span>
                            <input type="password" name="" placeholder="Password"  required>
                        </div>
                        <div class="mb-3">
                            <div class="custom-control custom-checkbox">
                                <input type="checkbox" class="custom-control-input " id="cbl" name="">
                                <label for="custom-control-label" for="cbl">Remember me</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <button type="submit" class="btn btn-block text-uppercase">Login</button>
                        </div>
                        <div class="text-right">
                            <a href="#" class="forget-link">
                                Forget Password?
                            </a>
                        </div>
                        <div class="text-center mb-3"> or login with</div>
                        <div class="row mb-3">
                            <div class="col-4">
                            <a href="#" class="btn btn-block btn-social btn-Facebook">Facebook</a>
                            <div class="col-4">
                                <a href="#" class="btn btn-block btn-social btn-Google">Google</a>
                            </div>
                            <div class="col-4">
                                <a href="#" class="btn btn-block btn-social btn-Twitter">Twitter</a>
                            </div>
                        </div>
                        <hr class="my-4">
                        <div class="text-center mb-2">
                            Don't have an account?
                            <a href="#" class="regiter-link">Register here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
